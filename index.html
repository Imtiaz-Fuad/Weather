<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel ="stylesheet" href ="styles.css">
</head>
<body>
    <div class="box">
        <div class="content">
            <div class="search-bar">
                <input placeholder="  enter city name">
                <button id="search-icon">
                    <img id="search" src="images/search.png">
                </button>
            </div>

    <!--  //////////////////////                      /////////////////////////  -->

            <div class="logo">
                <img id="weather-icon" src="images/clouds.png">
            </div>
            <div class="temp">
                <h1>22 C</h1>
                <h2>New York</h2>
            </div>

    <!--//////////////////////                        /////////////////////////////  -->

            <div class="report">
                <div class="humidity">
                    <img class="humidity-icon" src="images/humid.png">
                    <div class="factH">
                        <p class="upH">54%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <!--      ////////////////////////        -->

                <div class="wind">
                    <img class="wind-icon" src="images/wind.png">
                    <div class="factW ">
                        <p class="upW">18 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
